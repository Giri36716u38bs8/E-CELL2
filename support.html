<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support - Flux Essentials</title>
    <link rel="stylesheet" href="support.css">
</head>
<body>

    <div class="support">
        <h2>Help Center</h2>
        <p>Drop our support team a message. We usually respond in under 2 hours.</p>

        <form action="#" method="POST" onsubmit="event.preventDefault();">
            <div class="input">
                <label>Full Name</label>
                <input type="text" placeholder="John Doe" required>
            </div>

            <div class="input>
                <label>How can we help?</label>
                <textarea placeholder="Describe your inquiry in detail..." required></textarea>
            </div>

            <button type="submit" class="submit-btn">Send Message</button>
        </form>

        <a href="t.html" class="back-link">Return to Home</a>
    </div>

</body>
</html>
