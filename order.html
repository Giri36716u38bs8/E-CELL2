<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order - Flux Essentials</title>
    <link rel="stylesheet" href="order.css">
</head>
<body>

    <div class="tracking-">
        <span class="brand">⚡FLUX ESSENTIALS</span>
        <h2>Track Your Order</h2>
        <p>Enter your credentials below to instantly locate your delivery package status.</p>

        <form action="#" method="POST" onsubmit="event.preventDefault();">
            <div class="form">
                <label>Order Number</label>
                <input type="text" placeholder="e.g. FLUX-9821" required>
            </div>

            <div class="form">
                <label>Billing Email</label>
                <input type="email" placeholder="name@domain.com" required>
            </div>

            <button type="submit">Locate Package</button>
        </form>

        <a href="index.html" class="back-link">Return to Store</a>
    </div>
    <script>bn.js</script>

</body>
</html>
