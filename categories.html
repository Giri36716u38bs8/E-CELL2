<!DOCTYPE html>
<html lang="en">
<head>

    <title>Categories Flux Essentials</title>
    <link rel="stylesheet" href="categories.css">
</head>
<body>

    <div class="categories">

            <h2>Browse Departments</h2>
            <p>Select a category to filter our precisely engineered modern products.</p>

        <div class="categorygrid">
            <a href="#" class="categorycard tech">
                <div class="cardglow"></div>
                <div class="category-icon">⚡</div>
                <div class="category-info">
                    <h3>Smart Tech</h3>
                    <p>8 Products</p>
                </div>
            </a>

            <a href="#" class="categorycard footwear">
                <div class="cardglow"></div>
                <div class="categoryicon">👟</div>
                <div class="categoryinfo">
                    <h3>Footwear</h3>
                    <p>12 Products</p>
                </div>
            </a>

            <a href="#" class="categorycard audio">
                <div class="cardglow"></div>
                <div class="categoryicon">🎧</div>
                <div class="categoryinfo">
                    <h3>Audio Systems</h3>
                    <p>6 Products</p>
                </div>
            </a>

            <a href="#" class="categorycard wearables">
                <div class="cardglow"></div>
                <div class="categoryicon">⌚</div>
                <div class="categoryinfo">
                    <h3>Wearables</h3>
                    <p>5 Products</p>
                </div>
            </a>
        </div>

        <a href="t.html" class="back-link">Return to Home</a>
